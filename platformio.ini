; PlatformIO 项目配置文件
; K10 主控板控制麦昆小车项目

[env:unihiker_k10]
platform = https://github.com/DFRobot/platform-unihiker.git
board = unihiker_k10
framework = arduino

; 串口配置
monitor_speed = 115200
upload_speed = 921600

; 编译标志（USB和OTA支持）
build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -DModel=None

; OTA分区表配置
board_build.partitions = partitions.csv

; 项目结构
build_src_flags =
    -I"${PROJECT_DIR}"
